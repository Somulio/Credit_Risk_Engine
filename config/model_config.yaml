gradient_boosting:
  n_estimators: 300
  max_depth: 5
  learning_rate: 0.05
  subsample: 0.8
  min_samples_leaf: 15
  validation_fraction: 0.1
  n_iter_no_change: 20
  tol: 0.0001
  random_state: 42

logistic:
  C: 0.1
  penalty: l2
  solver: lbfgs
  max_iter: 1000
  class_weight: balanced

# XGBoost config (use if xgboost available)
xgboost:
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 10
  gamma: 1
  reg_alpha: 0.1
  reg_lambda: 1.0
  scale_pos_weight: 3
  eval_metric: auc
  early_stopping_rounds: 50
